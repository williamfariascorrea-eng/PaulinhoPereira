<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta property="og:title" content="Paulinho Pereira - Vereador São Lourenço do Sul">
    <meta property="og:image" content="images/FOTO DE PERFIL.jpg">
    <title>Post Social Media - Paulinho Pereira</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; }
        .post-container {
            width: 1080px;
            height: 1350px;
            background: linear-gradient(135deg, #14274E 0%, #3498DB 100%);
            position: relative;
            overflow: hidden;
            padding: 60px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        .radio-waves {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            opacity: 0.1;
            background-image: url("data:image/svg+xml,%3Csvg width='100' height='100' viewBox='0 0 100 100' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M50 10a40 40 0 1 1 0 80 40 40 0 0 1 0-80zm0 10a30 30 0 1 1 0 60 30 30 0 0 1 0-60zm0 10a20 20 0 1 1 0 40 20 20 0 0 1 0-40zm0 10a10 10 0 1 1 0 20 10 10 0 0 1 0-20z' fill='none' stroke='%23FFFFFF' stroke-width='2'/%3E%3C/svg%3E");
            background-size: 200px;
        }
        .profile-img {
            width: 600px;
            height: 600px;
            border-radius: 20px;
            object-fit: cover;
            border: 4px solid #2D7F5F;
            box-shadow: 0 20px 40px rgba(0,0,0,0.3);
            margin-bottom: 40px;
        }
        .text-content {
            text-align: center;
            color: #FFFFFF;
            max-width: 800px;
        }
        .title {
            font-size: 72px;
            font-weight: 700;
            margin-bottom: 20px;
        }
        .subtitle {
            font-size: 36px;
            font-weight: 400;
            margin-bottom: 40px;
            color: #2D7F5F;
        }
        .accent-line {
            width: 200px;
            height: 4px;
            background: #2D7F5F;
            margin: 0 auto 40px;
        }
        .footer {
            position: absolute;
            bottom: 60px;
            display: flex;
            align-items: center;
            gap: 20px;
        }
        .podemos-logo {
            width: 80px;
            height: 80px;
        }
        .footer-text {
            color: #FFFFFF;
            font-size: 24px;
        }
    </style>
</head>
<body>
    <div class="post-container">
        <div class="radio-waves"></div>
        <img src="images/FOTO DE PERFIL.jpg" alt="Paulinho Pereira" class="profile-img">
        <div class="text-content">
            <h1 class="title">Paulinho Pereira</h1>
            <div class="accent-line"></div>
            <p class="subtitle">Vereador de São Lourenço do Sul (2012-2026)</p>
            <p class="subtitle">104.3 FM - Rádio Litoral Sul | Quintas 20h-22h</p>
        </div>
        <div class="footer">
            <img src="images/PODEMOS simbolo.jpg" alt="Podemos" class="podemos-logo">
            <p class="footer-text">#PaulinhoPereira #Podemos #SãoLourençoDoSul</p>
        </div>
    </div>
</body>
</html>
